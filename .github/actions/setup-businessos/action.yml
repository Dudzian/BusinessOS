name: Setup BusinessOS
runs:
  using: composite
  steps:
    - name: Read environment lock
      id: lock
      shell: pwsh
      run: |
        $lock = Get-Content eng/environment.lock.json -Raw | ConvertFrom-Json
        "dotnet=$($lock.dotnetSdk)" >> $env:GITHUB_OUTPUT
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ steps.lock.outputs.dotnet }}
        cache: true
        cache-dependency-path: |
          global.json
          eng/environment.lock.json
          Directory.Packages.props
          **/*.csproj
    - uses: actions/cache@v4
      with:
        path: |
          .cache/nuget
          .cache/dotnet-home
        key: businessos-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('global.json', 'eng/environment.lock.json', 'Directory.Packages.props', '**/*.csproj') }}
    - shell: pwsh
      run: ./eng/setup-environment.ps1
    - shell: pwsh
      run: . ./eng/activate-environment.ps1; ./eng/doctor.ps1 -Mode CrossPlatform | Tee-Object .cache/doctor.txt
    - uses: actions/upload-artifact@v4
      with:
        name: businessos-environment-${{ runner.os }}-${{ runner.arch }}
        path: .cache/doctor.txt
