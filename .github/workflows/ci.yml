name: ci
on:
  pull_request:
  push:
    branches: [ main, work, work/block-1-foundation ]
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'
      - name: .NET info
        run: dotnet --info
      - name: List solution projects
        run: dotnet sln BusinessOS.sln list
      - name: Verify solution membership
        shell: pwsh
        run: ./eng/check-solution-projects.ps1
      - name: Restore
        run: dotnet restore BusinessOS.sln
      - name: Verify formatting
        run: dotnet format BusinessOS.sln --verify-no-changes
      - name: Build Release
        run: dotnet build BusinessOS.sln --configuration Release --no-restore
      - name: Smoke test desktop application
        shell: pwsh
        run: ./eng/smoke-test-desktop.ps1 -Configuration Release
      - name: Self-test TRX verifier
        shell: pwsh
        run: ./eng/verify-test-results.ps1 -ResultsDirectory tests/fixtures/trx
      - name: Self-test TRX verifier failure paths
        shell: pwsh
        run: ./eng/test-verify-test-results.ps1
      - name: Clean previous test results
        shell: pwsh
        run: |
          if (Test-Path artifacts/test-results) {
            Remove-Item artifacts/test-results -Recurse -Force
          }
      - name: Test Release
        run: dotnet test BusinessOS.sln --configuration Release --no-build --logger trx --results-directory artifacts/test-results
      - name: Verify TRX test results
        shell: pwsh
        run: ./eng/verify-test-results.ps1
      - name: Vulnerable package scan
        shell: pwsh
        run: ./eng/check-vulnerable-packages.ps1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts/test-results/**
