name: ci
on:
  pull_request:
  push:
    branches: [ main, work, work/block-1-foundation ]
jobs:
  cross-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-businessos
      - name: Verify tool versions after setup
        shell: pwsh
        run: |
          dotnet --version 2>&1 | Tee-Object .cache/cross-platform-tool-versions.log
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion.ToString()' 2>&1 | Tee-Object .cache/cross-platform-tool-versions.log -Append
      - name: Verify cross-platform gate
        shell: pwsh
        run: ./eng/verify-cross-platform.ps1 2>&1 | Tee-Object .cache/verify-cross-platform.log
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cross-platform-diagnostics
          path: |
            .cache/setup.log
            .cache/doctor.txt
            .cache/tool-versions.log
            .cache/cross-platform-tool-versions.log
            .cache/verify-cross-platform.log
            .cache/environment-tests.log
            artifacts/test-results/**
            **/*.trx
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-businessos
      - name: Verify tool versions after setup
        shell: pwsh
        run: |
          dotnet --version 2>&1 | Tee-Object .cache/windows-tool-versions.log
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion.ToString()' 2>&1 | Tee-Object .cache/windows-tool-versions.log -Append
      - name: Verify Windows gate
        shell: pwsh
        run: ./eng/verify-windows.ps1 2>&1 | Tee-Object .cache/verify-windows.log
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: windows-diagnostics
          path: |
            .cache/setup.log
            .cache/doctor.txt
            .cache/tool-versions.log
            .cache/windows-tool-versions.log
            .cache/verify-windows.log
            artifacts/test-results/**
            **/*.trx
            artifacts/smoke-test/**
